name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint on Ubuntu"
    runs-on: ubuntu-latest

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm itself
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Linting (oxlint)
        run: pnpm lint

      - name: Formatting (oxfmt)
        run: pnpm format:check

      - name: Run TypeScript build only (no linting)
        run: pnpm build

      - name: Type-aware Linting (oxlint)
        run: pnpm lint-type

  tests:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        platform: [ubuntu-latest]

    name: "Unit Tests on Ubuntu / Node${{ matrix.node }}"
    runs-on: ${{ matrix.platform }}
    if: ${{ !startsWith(github.event.head_commit.message, 'docs:') }}

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2 # codecov-bash seems to require this

      - name: Install pnpm itself
        uses: pnpm/action-setup@v6

      - name: Set NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - run: node --version
      - run: pnpm --version

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Cache TypeScript and Vitest
        uses: actions/cache@v6
        with:
          path: |
            packages/*/lib
            packages/*/tsconfig.tsbuildinfo
            node_modules/.vitest
          key: vitest-${{ matrix.platform }}-${{ matrix.node }}-${{ github.run_id }}
          restore-keys: vitest-${{ matrix.platform }}-${{ matrix.node }}-

      - name: Run full TypeScript build
        run: pnpm build:full

      - name: Run Vitest unit tests (JUnit)
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        env:
          NO_COLOR: true
        run: pnpm test -- --reporter=junit --outputFile=test-report.junit.xml

      - name: Debug - list JUnit XML file
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        run: |
          echo "Repo root:"
          ls -la
          echo "Expected junit file:"
          ls -la test-report.junit.xml || true
          echo "Any junit.xml files (max depth 4):"
          find . -maxdepth 4 -name "*junit*.xml" -print || true

      - name: Upload test results to Codecov (JUnit)
        if: |
          !cancelled() &&
          !contains(github.event.head_commit.message, 'chore(release)')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./test-report.junit.xml

  e2e:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        platform: [ubuntu-latest]

    name: "E2E Tests on Ubuntu / Node${{ matrix.node }}"
    runs-on: ${{ matrix.platform }}
    if: ${{ !startsWith(github.event.head_commit.message, 'docs:') }}

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm itself
        uses: pnpm/action-setup@v6

      - name: Set NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - run: node --version
      - run: pnpm --version

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Cache TypeScript build
        uses: actions/cache@v6
        with:
          path: |
            packages/*/lib
            packages/*/tsconfig.tsbuildinfo
          key: e2e-build-${{ matrix.platform }}-${{ matrix.node }}-${{ github.run_id }}
          restore-keys: e2e-build-${{ matrix.platform }}-${{ matrix.node }}-

      - name: Run full TypeScript build
        run: pnpm build:full

      - name: Run E2E tests (JUnit)
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        env:
          NO_COLOR: true
        run: pnpm test:e2e -- --reporter=junit --outputFile=e2e-test-report.junit.xml

      - name: Debug - list E2E JUnit XML file
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        run: |
          echo "Expected e2e junit file:"
          ls -la e2e-test-report.junit.xml || true

      - name: Upload E2E test results to Codecov (JUnit)
        if: |
          !cancelled() &&
          !contains(github.event.head_commit.message, 'chore(release)')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./e2e-test-report.junit.xml
