name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint on Ubuntu"
    runs-on: ubuntu-latest

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install pnpm itself
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false

      - name: Set NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: "pnpm"

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Linting (oxlint)
        run: pnpm lint

      - name: Formatting (oxfmt)
        run: pnpm format:check

      - name: Run TypeScript build only (no linting)
        run: pnpm build

      - name: Type-aware Linting (oxlint)
        run: pnpm lint-type

  tests:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        platform: [ubuntu-latest]

    name: "Unit Tests on Ubuntu / Node${{ matrix.node }}"
    runs-on: ${{ matrix.platform }}
    if: ${{ !startsWith(github.event.head_commit.message, 'docs:') }}

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 2 # codecov-bash seems to require this

      - name: Install pnpm itself
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - run: node --version
      - run: pnpm --version

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Cache TypeScript and Vitest
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            packages/*/lib
            packages/*/tsconfig.tsbuildinfo
            node_modules/.vitest
          key: vitest-${{ matrix.platform }}-${{ matrix.node }}-${{ github.run_id }}
          restore-keys: vitest-${{ matrix.platform }}-${{ matrix.node }}-

      - name: Run full TypeScript build
        run: pnpm build:full

      - name: Run Vitest unit tests
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        env:
          NO_COLOR: true
        run: pnpm test

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && contains(matrix.node, 24) && !contains(github.event.head_commit.message, 'chore(release)') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./coverage/test-report.junit.xml

      - name: Upload test coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/clover.xml,./coverage/coverage-final.json
          disable_search: true
          fail_ci_if_error: true
        if: |
          contains(matrix.node, 24) &&
          !contains(github.event.head_commit.message, 'chore(release)')

  e2e:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 26]
        platform: [ubuntu-latest]

    name: "E2E Tests on Ubuntu / Node${{ matrix.node }}"
    runs-on: ${{ matrix.platform }}
    if: ${{ !startsWith(github.event.head_commit.message, 'docs:') }}

    steps:
      - name: Retrieve current Date Time in EST
        shell: bash
        run: echo "START_TIME=$(TZ=":America/New_York" date -R|sed 's/.....$//')" >> $GITHUB_ENV

      - name: Current datetime - ${{ env.START_TIME }}
        run: echo ${{ env.START_TIME }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install pnpm itself
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set NodeJS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - run: node --version
      - run: pnpm --version

      - name: Run pnpm install dependencies
        run: pnpm install

      - name: Cache TypeScript build
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            packages/*/lib
            packages/*/tsconfig.tsbuildinfo
          key: e2e-build-${{ matrix.platform }}-${{ matrix.node }}-${{ github.run_id }}
          restore-keys: e2e-build-${{ matrix.platform }}-${{ matrix.node }}-

      - name: Run full TypeScript build
        run: pnpm build:full

      - name: Run E2E tests
        if: |
          !contains(github.event.head_commit.message, 'chore(release)')
        env:
          NO_COLOR: true
        run: pnpm test:e2e
