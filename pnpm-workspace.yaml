packages:
  # workspace packages
  - packages/**
  
  # e2e utilities (not published)
  - e2e-utils

  # exclude packages that are inside test directories
  - "!**/__fixtures__/**"
  - "!**/__test__/**"

minimumReleaseAge: 2880 # 2 days in minutes
minimumReleaseAgeExclude:
  # exclude packages that I personally maintain and are safe to use on the same day
  - 'eslint-plugin-local-import-ext'

# Define a catalog of version ranges.
catalog:
  ci-info: ^4.4.0
  dedent: ^1.7.2
  dotenv: ^17.4.2
  has-unicode: ^2.0.1
  npm-package-arg: ^13.0.2
  npm-registry-fetch: ^19.1.1
  p-map: ^7.0.4
  semver: ^7.8.0

# add a few named catalog: for Lerna-Lite to test its own code with real projects
catalogs:
  # Can be referenced through "catalog:devDependencies"
  devDependencies:
    "@types/dedent": ^0.7.2
    "@types/node": ^24.12.4
    "@types/npm-package-arg": ^6.1.4
    "@types/npmcli__package-json": ^4.0.4
    "@types/pacote": ^11.1.8
    "@types/semver": ^7.7.1
    "@types/yargs-parser": ^21.0.3
    yargs-parser: ^22.0.0

  # Can be referenced through "catalog:dependencies"
  dependencies:
    columnify: ^1.6.0
    load-json-file: ^7.0.1
    tinyexec: ^1.1.2
    tinyglobby: ^0.2.16
    write-json-file: ^7.0.0
    yaml: ^2.9.0
    yargs: ^18.0.0
    zeptomatch: ^2.1.0
